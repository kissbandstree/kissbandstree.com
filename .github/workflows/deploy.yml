name: Deploy site

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
      - .vscode/**
      - .gitignore
      - DEPLOYMENT.md
      - README.md
      - LICENCE
  workflow_dispatch:
    inputs:
      mode:
        description: Deployment mode
        required: true
        type: choice
        default: changed
        options:
          - changed
          - full

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload via SFTP
    runs-on: ubuntu-latest

    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
      SFTP_REMOTE_DIR: ${{ vars.SFTP_REMOTE_DIR }}
      DEPLOY_MODE: ${{ github.event.inputs.mode || 'changed' }}
      DEPLOY_UPLOAD_LIST: /tmp/deploy-upload.txt
      DEPLOY_DELETE_LIST: /tmp/deploy-delete.txt
      DEPLOY_LFTP_SCRIPT: /tmp/deploy.lftp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate deployment settings
        shell: bash
        run: |
          test -n "$SFTP_HOST" || { echo "Missing secret: SFTP_HOST"; exit 1; }
          test -n "$SFTP_USERNAME" || { echo "Missing secret: SFTP_USERNAME"; exit 1; }
          test -n "$SFTP_PASSWORD" || { echo "Missing secret: SFTP_PASSWORD"; exit 1; }
          test -n "$SFTP_REMOTE_DIR" || { echo "Missing variable: SFTP_REMOTE_DIR"; exit 1; }

      - name: Prepare deployment plan
        id: plan
        shell: bash
        run: |
          : > "$DEPLOY_UPLOAD_LIST"
          : > "$DEPLOY_DELETE_LIST"

          mode="$DEPLOY_MODE"
          if [[ "$mode" == "full" ]]; then
            {
              echo "mode=full"
              echo "has_changes=true"
              echo "upload_count=full"
              echo "delete_count=0"
            } >> "$GITHUB_OUTPUT"
            echo "Full sync requested."
            exit 0
          fi

          if ! base_commit=$(git rev-parse HEAD^ 2>/dev/null); then
            {
              echo "mode=full"
              echo "has_changes=true"
              echo "upload_count=full"
              echo "delete_count=0"
            } >> "$GITHUB_OUTPUT"
            echo "No parent commit found; falling back to full sync."
            exit 0
          fi

          is_excluded() {
            case "$1" in
              .git/*|.github/*|.vscode/*|.gitignore|DEPLOYMENT.md|README.md|LICENCE)
                return 0
                ;;
            esac
            return 1
          }

          while IFS=$'\t' read -r status path_a path_b; do
            [[ -z "$status" ]] && continue

            case "$status" in
              A|M|T)
                if ! is_excluded "$path_a" && [[ -f "$path_a" ]]; then
                  echo "$path_a" >> "$DEPLOY_UPLOAD_LIST"
                fi
                ;;
              D)
                if ! is_excluded "$path_a"; then
                  echo "$path_a" >> "$DEPLOY_DELETE_LIST"
                fi
                ;;
              R*)
                if ! is_excluded "$path_a"; then
                  echo "$path_a" >> "$DEPLOY_DELETE_LIST"
                fi
                if ! is_excluded "$path_b" && [[ -f "$path_b" ]]; then
                  echo "$path_b" >> "$DEPLOY_UPLOAD_LIST"
                fi
                ;;
              C*)
                if ! is_excluded "$path_b" && [[ -f "$path_b" ]]; then
                  echo "$path_b" >> "$DEPLOY_UPLOAD_LIST"
                fi
                ;;
            esac
          done < <(git diff --name-status -M "$base_commit" "$GITHUB_SHA")

          upload_count=$(grep -c . "$DEPLOY_UPLOAD_LIST" || true)
          delete_count=$(grep -c . "$DEPLOY_DELETE_LIST" || true)

          if [[ "$upload_count" -eq 0 && "$delete_count" -eq 0 ]]; then
            has_changes=false
            echo "No deployable file changes found."
          else
            has_changes=true
            echo "Deployable uploads: $upload_count"
            echo "Deployable deletes: $delete_count"
          fi

          {
            echo "mode=changed"
            echo "has_changes=$has_changes"
            echo "upload_count=$upload_count"
            echo "delete_count=$delete_count"
          } >> "$GITHUB_OUTPUT"

      - name: Install lftp
        if: steps.plan.outputs.has_changes == 'true'
        shell: bash
        run: |
          if ! command -v lftp >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends lftp || {
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends lftp
            }
          fi

      - name: Trust SFTP host key
        if: steps.plan.outputs.has_changes == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SFTP_PORT" "$SFTP_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload changed website files
        if: steps.plan.outputs.mode == 'changed' && steps.plan.outputs.has_changes == 'true'
        shell: bash
        run: |
          remote_root="${SFTP_REMOTE_DIR%/}"

          {
            echo "set cmd:fail-exit yes"
            echo "set net:max-retries 2"
            echo "set net:timeout 30"
            printf 'mkdir -p "%s"\n' "$remote_root"
          } > "$DEPLOY_LFTP_SCRIPT"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            printf 'rm -f "%s/%s"\n' "$remote_root" "$file" >> "$DEPLOY_LFTP_SCRIPT"
          done < "$DEPLOY_DELETE_LIST"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            dir=$(dirname "$file")
            if [[ "$dir" == "." ]]; then
              target_dir="$remote_root"
            else
              target_dir="$remote_root/$dir"
            fi
            printf 'mkdir -p "%s"\n' "$target_dir" >> "$DEPLOY_LFTP_SCRIPT"
            printf 'put -O "%s" "%s"\n' "$target_dir" "$file" >> "$DEPLOY_LFTP_SCRIPT"
          done < "$DEPLOY_UPLOAD_LIST"

          echo "bye" >> "$DEPLOY_LFTP_SCRIPT"
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" < "$DEPLOY_LFTP_SCRIPT"

      - name: Full sync website files
        if: steps.plan.outputs.mode == 'full' && steps.plan.outputs.has_changes == 'true'
        shell: bash
        run: |
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          mirror --reverse --verbose --only-newer --no-perms --parallel=4 \
            --exclude-glob .git/** \
            --exclude-glob .github/** \
            --exclude-glob .vscode/** \
            --exclude-glob .gitignore \
            --exclude-glob DEPLOYMENT.md \
            --exclude-glob README.md \
            --exclude-glob LICENCE \
            ./ "$SFTP_REMOTE_DIR"
          bye
          EOF